name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: configure
        run: cmake -S . -B build

      - name: build
        run: cmake --build build --config Release

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-parser-${{ matrix.os }}
          path: |
            build/Release/json-parser.exe
            build/json-parser